services:
  db:
    image: postgres:16-alpine
    container_name: provas_dcer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: provas_dcer
      POSTGRES_USER: provas_dcer
      POSTGRES_PASSWORD: provas_dcer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provas_dcer -d provas_dcer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
