services:
  app:
    build:
      context: .
    container_name: provas_dcer_app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://provas_dcer:provas_dcer_dev@db:5432/provas_dcer?schema=public
      ADMIN_PASSWORD: admin123
      ADMIN_SESSION_SECRET: troque-este-segredo-no-servidor-linux
      NEXT_TELEMETRY_DISABLED: "1"
      APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: provas_dcer_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: provas_dcer
      POSTGRES_USER: provas_dcer
      POSTGRES_PASSWORD: provas_dcer_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provas_dcer -d provas_dcer"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: provas_dcer_data
